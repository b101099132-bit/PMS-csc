<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>儀表板 — 心臟外科手術病人管理系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream: #FAF7F2;
  --paper: #FFFFFF;
  --ink: #1A1A1A;
  --ink-soft: #5C5C5C;
  --ink-faint: #8A8580;
  --teal: #1F5A5A;
  --teal-tint: #F5F9F9;
  --teal-soft: #E6EDED;
  --gold: #A87B4D;
  --plum: #6B5876;
  --plum-tint: #F2EFF4;
  --navy: #2C4866;
  --navy-tint: #EEF2F7;
  --border: #E8E2D5;
  --border-strong: #D4CDB8;
  --success: #4A7A5A;
  --success-bg: #EDF3EE;
  --warn: #B8842D;
  --warn-bg: #FBF3DE;
  --error: #B85450;
  --error-bg: #FBEFEE;
}

body {
  font-family: 'Noto Sans TC', system-ui, sans-serif;
  background: var(--cream);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.6;
  padding: 20px 16px 60px;
  -webkit-font-smoothing: antialiased;
}
.container { max-width: 1080px; margin: 0 auto; }

/* ========== Header ========== */
header {
  margin: 16px 0 24px;
  padding-bottom: 22px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}
.brand .eyebrow {
  font-size: 11px;
  letter-spacing: 0.3em;
  color: var(--gold);
  text-transform: uppercase;
  font-weight: 500;
  margin-bottom: 6px;
}
.brand h1 {
  font-family: 'Noto Serif TC', serif;
  font-size: 24px;
  font-weight: 600;
  color: var(--ink);
}
.role-tag {
  background: var(--navy);
  color: white;
  padding: 4px 12px;
  border-radius: 3px;
  font-size: 12px;
  letter-spacing: 0.1em;
  font-weight: 500;
}
.as-of {
  font-size: 12px;
  color: var(--ink-faint);
  margin-top: 4px;
}

/* ========== Key Bar ========== */
.key-bar {
  background: var(--navy-tint);
  border: 1px solid #DCE3EB;
  border-radius: 3px;
  padding: 12px 16px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.key-bar label { font-size: 13px; color: var(--navy); font-weight: 500; }
.key-bar input {
  flex: 1;
  min-width: 180px;
  padding: 7px 12px;
  border: 1px solid var(--border-strong);
  border-radius: 3px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  background: white;
}
.key-bar input:focus {
  outline: none;
  border-color: var(--navy);
  box-shadow: 0 0 0 3px rgba(44, 72, 102, 0.12);
}
.btn-refresh {
  padding: 7px 14px;
  background: var(--paper);
  border: 1px solid var(--border-strong);
  border-radius: 3px;
  cursor: pointer;
  font-size: 13px;
  color: var(--ink-soft);
  font-family: inherit;
}
.btn-refresh:hover { border-color: var(--navy); color: var(--navy); }

/* ========== Section title ========== */
.section-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 17px;
  color: var(--ink);
  font-weight: 600;
  margin: 30px 0 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.section-title .num {
  font-size: 12px;
  color: var(--gold);
  letter-spacing: 0.1em;
}
.section-title .sub {
  font-size: 12px;
  color: var(--ink-faint);
  font-family: 'Noto Sans TC', sans-serif;
  font-weight: 400;
  margin-left: auto;
}

/* ========== Overview cards ========== */
.overview-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}
@media (max-width: 760px) { .overview-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 400px) { .overview-grid { grid-template-columns: 1fr; } }

.ov-card {
  background: var(--paper);
  border: 1px solid var(--border);
  border-top: 3px solid var(--accent);
  border-radius: 3px;
  padding: 16px 18px;
}
.ov-card[data-accent="teal"]  { --accent: var(--teal); }
.ov-card[data-accent="gold"]  { --accent: var(--gold); }
.ov-card[data-accent="plum"]  { --accent: var(--plum); }
.ov-card[data-accent="navy"]  { --accent: var(--navy); }
.ov-label {
  font-size: 12px;
  color: var(--ink-faint);
  letter-spacing: 0.05em;
  margin-bottom: 6px;
  font-weight: 500;
}
.ov-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 32px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.1;
}
.ov-value.placeholder { color: var(--ink-faint); font-size: 24px; }
.ov-unit {
  font-size: 12px;
  color: var(--ink-faint);
  margin-left: 4px;
}

/* ========== Tabs ========== */
.tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 0;
  border-bottom: 1px solid var(--border);
}
.tab {
  padding: 9px 16px;
  font-family: inherit;
  font-size: 14px;
  border: 1px solid transparent;
  border-bottom: none;
  background: transparent;
  cursor: pointer;
  color: var(--ink-soft);
  font-weight: 500;
  margin-bottom: -1px;
  transition: all 0.15s;
}
.tab:hover { color: var(--ink); }
.tab.active {
  background: var(--paper);
  border-color: var(--border);
  color: var(--navy);
  font-weight: 600;
}
.tab .count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--ink-faint);
  margin-left: 4px;
}
.tab.active .count { color: var(--navy); }

.tab-content {
  background: var(--paper);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 3px 3px;
  min-height: 100px;
}

/* ========== Patient list ========== */
.plist {
  list-style: none;
}
.plist-row {
  display: grid;
  grid-template-columns: 1.4fr 1fr 1.2fr 0.8fr;
  gap: 12px;
  padding: 11px 18px;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
  align-items: center;
}
.plist-row:last-child { border-bottom: none; }
.plist-row:hover { background: var(--cream); }
.plist-row.header {
  font-size: 12px;
  color: var(--ink-faint);
  font-weight: 500;
  letter-spacing: 0.05em;
  background: var(--cream);
  border-bottom: 1px solid var(--border-strong);
}
.plist-row .name { font-weight: 500; }
.plist-row .meta { color: var(--ink-soft); font-size: 13px; }
.plist-row .date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--ink);
}
.plist-row .surgery { color: var(--gold); font-weight: 500; font-size: 13px; }
.plist-empty {
  padding: 28px;
  text-align: center;
  color: var(--ink-faint);
  font-style: italic;
  font-size: 13px;
}
.status-pill {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 500;
}
.status-pill.scheduled { background: var(--warn-bg); color: var(--warn); }
.status-pill.completed { background: var(--success-bg); color: var(--success); }
.status-pill.cancelled { background: #F0EEEA; color: var(--ink-faint); }
.status-pill.reschedule { background: var(--plum-tint); color: var(--plum); }
@media (max-width: 600px) {
  .plist-row { grid-template-columns: 1fr; gap: 4px; padding: 12px 16px; }
  .plist-row.header { display: none; }
}

/* ========== Metric stat cards ========== */
.metric-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
@media (max-width: 760px) { .metric-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 480px) { .metric-grid { grid-template-columns: 1fr; } }

.mc {
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.mc-label {
  font-size: 13px;
  color: var(--ink-soft);
  line-height: 1.4;
}
.mc-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 24px;
  font-weight: 600;
  color: var(--ink);
  display: flex;
  align-items: baseline;
  gap: 4px;
}
.mc-value.muted { color: var(--ink-faint); font-size: 16px; font-weight: 500; }
.mc-value .unit { font-size: 13px; color: var(--ink-faint); font-weight: 400; }
.mc-meta {
  font-size: 11px;
  color: var(--ink-faint);
  margin-top: 2px;
}
.mc.pending { background: #FAF7EE; border-style: dashed; }
.mc.pending .mc-meta { color: var(--warn); font-style: italic; }

/* Rates */
.rate-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
@media (max-width: 600px) { .rate-grid { grid-template-columns: 1fr; } }
.rate-card {
  background: var(--paper);
  border: 1px solid var(--border);
  border-left: 4px solid var(--plum);
  border-radius: 3px;
  padding: 18px 20px;
}
.rate-label {
  font-size: 14px;
  color: var(--ink);
  font-weight: 500;
  margin-bottom: 4px;
}
.rate-def {
  font-size: 12px;
  color: var(--ink-faint);
  margin-bottom: 12px;
  font-style: italic;
}
.rate-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 32px;
  font-weight: 600;
  color: var(--plum);
  display: flex;
  align-items: baseline;
  gap: 8px;
}
.rate-value .unit { font-size: 14px; font-weight: 400; color: var(--ink-soft); }
.rate-frac {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--ink-soft);
  margin-top: 4px;
}
.rate-value.muted { color: var(--ink-faint); font-size: 18px; }

/* Satisfaction placeholder */
.placeholder-card {
  background: var(--paper);
  border: 1px dashed var(--border-strong);
  border-radius: 3px;
  padding: 28px 24px;
  text-align: center;
}
.placeholder-card .ph-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 16px;
  color: var(--ink-soft);
  margin-bottom: 6px;
}
.placeholder-card .ph-desc {
  font-size: 13px;
  color: var(--ink-faint);
}

/* ========== Year tabs (historical section) ========== */
.year-tab-bar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  padding: 12px 0 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}
.year-tab {
  padding: 5px 14px;
  border: 1px solid var(--border-strong);
  border-radius: 14px;
  background: var(--paper);
  color: var(--ink-soft);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s ease;
}
.year-tab:hover {
  border-color: var(--gold);
  color: var(--gold);
}
.year-tab.active {
  background: var(--gold);
  border-color: var(--gold);
  color: white;
  font-weight: 500;
}
.year-tab .yc {
  font-size: 10px;
  opacity: 0.85;
  margin-left: 4px;
}

/* ========== Historical Baseline ========== */
.hist-card {
  background: var(--paper);
  border: 1px solid var(--border);
  border-left: 4px solid var(--gold);
  border-radius: 3px;
  padding: 20px 22px;
}
.hist-band {
  display: flex;
  align-items: baseline;
  gap: 14px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.hist-band .total-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 36px;
  font-weight: 600;
  color: var(--gold);
  line-height: 1;
}
.hist-band .total-label {
  font-size: 13px;
  color: var(--ink-soft);
}
.hist-band .total-label strong { color: var(--ink); }
.hist-band .total-date {
  font-size: 12px;
  color: var(--ink-faint);
  margin-left: auto;
  font-family: 'JetBrains Mono', monospace;
}

.hist-sub {
  font-family: 'Noto Serif TC', serif;
  font-size: 13px;
  color: var(--plum);
  font-weight: 600;
  margin: 14px 0 8px;
  letter-spacing: 0.05em;
}
.hist-sub:first-child { margin-top: 0; }

.year-bar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}
@media (max-width: 600px) {
  .year-bar { grid-template-columns: repeat(4, 1fr); }
}
.year-cell {
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 8px 4px;
  text-align: center;
}
.year-cell .y { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-faint); }
.year-cell .n { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 600; color: var(--ink); line-height: 1.2; }

.hist-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: 10px;
}
.hist-stat {
  background: var(--cream);
  border-radius: 3px;
  padding: 10px 12px;
}
.hist-stat .lbl {
  font-size: 12px;
  color: var(--ink-soft);
  margin-bottom: 4px;
}
.hist-stat .val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  font-weight: 600;
  color: var(--ink);
}
.hist-stat .val .small {
  font-size: 11px;
  color: var(--ink-faint);
  font-weight: 400;
  margin-left: 4px;
}
.hist-stat .pct-bar {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  margin-top: 6px;
  overflow: hidden;
}
.hist-stat .pct-bar .fill {
  height: 100%;
  background: var(--gold);
  border-radius: 3px;
}

/* Historical reference in rate cards */
.rate-card .historical-ref {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px dashed var(--border);
  font-size: 12px;
  color: var(--ink-faint);
  display: flex;
  align-items: baseline;
  gap: 6px;
}
.rate-card .historical-ref .hist-val {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 500;
  color: var(--gold);
}

/* Overview card with split */
.ov-card .ov-split {
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px dashed var(--border);
  font-size: 11px;
  color: var(--ink-faint);
  display: flex;
  justify-content: space-between;
  font-family: 'JetBrains Mono', monospace;
}

/* Alerts / loading */
.alert {
  padding: 12px 16px;
  border-radius: 3px;
  margin-bottom: 16px;
  font-size: 14px;
  font-weight: 500;
  display: none;
}
.alert.show { display: block; }
.alert-error { background: var(--error-bg); color: var(--error); border-left: 3px solid var(--error); }
.alert-info { background: var(--navy-tint); color: var(--navy); border-left: 3px solid var(--navy); }

.loading-block {
  padding: 40px 20px;
  text-align: center;
  color: var(--ink-faint);
  font-size: 14px;
}
.loading {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid currentColor;
  border-right-color: transparent;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: -2px;
  margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ========== Trend Charts ========== */
.trend-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 14px;
}
.trend-grid.full { grid-template-columns: 1fr; }
@media (max-width: 700px) {
  .trend-grid { grid-template-columns: 1fr; }
}

.chart-card {
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 16px 18px;
}
.chart-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 14px;
  color: var(--ink);
  font-weight: 600;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
}
.chart-legend {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  font-size: 11px;
  color: var(--ink-soft);
  font-family: 'Noto Sans TC', sans-serif;
  font-weight: 400;
}
.legend-item {
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.legend-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  display: inline-block;
}

.trend-chart {
  width: 100%;
  height: auto;
  display: block;
  font-family: 'JetBrains Mono', monospace;
}
.trend-chart .grid {
  stroke: var(--border);
  stroke-width: 0.5;
  stroke-dasharray: 2 3;
  fill: none;
}
.trend-chart .y-label {
  font-size: 9px;
  fill: var(--ink-faint);
  text-anchor: end;
}
.trend-chart .x-label {
  font-size: 10px;
  fill: var(--ink-soft);
  text-anchor: middle;
}
.trend-chart .bar-label {
  font-size: 10px;
  fill: var(--ink);
  text-anchor: middle;
  font-weight: 500;
}
.trend-chart .line {
  fill: none;
  stroke-linejoin: round;
  stroke-linecap: round;
}
.trend-chart .dot {
  cursor: pointer;
  transition: r 0.15s;
}
.trend-chart .dot:hover { r: 5.5; }
.trend-chart .bar {
  cursor: pointer;
  transition: opacity 0.15s;
}
.trend-chart .bar:hover { opacity: 0.75; }

/* ========== Satisfaction Section ========== */
.sat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 14px;
}
@media (max-width: 700px) {
  .sat-grid { grid-template-columns: 1fr; }
}
.sat-big-card {
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 20px 22px;
  text-align: center;
}
.sat-big-card .lbl {
  font-family: 'Noto Serif TC', serif;
  font-size: 13px;
  color: var(--ink-soft);
  font-weight: 600;
  margin-bottom: 10px;
  letter-spacing: 0.05em;
}
.sat-big-card .big {
  font-family: 'JetBrains Mono', monospace;
  font-size: 44px;
  font-weight: 600;
  color: var(--gold);
  line-height: 1;
}
.sat-big-card .big-unit {
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  color: var(--ink-faint);
  margin-left: 6px;
}
.sat-big-card .meta {
  margin-top: 8px;
  font-size: 12px;
  color: var(--ink-faint);
}
.sat-big-card .big.muted { color: var(--ink-faint); font-size: 28px; }

.sat-q-card {
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 16px 20px;
  margin-bottom: 12px;
}
.sat-q-card .sat-q-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 14px;
  color: var(--plum);
  font-weight: 600;
  margin-bottom: 12px;
}
.sat-q-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.sat-q {
  display: grid;
  grid-template-columns: 130px 36px 1fr 52px;
  gap: 10px;
  align-items: center;
  font-size: 13px;
}
.sat-q .lbl { color: var(--ink); }
.sat-q .val {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  color: var(--ink);
  text-align: right;
}
.sat-q .val.muted { color: var(--ink-faint); font-weight: 400; }
.sat-bar {
  height: 7px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
}
.sat-bar .fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), #d4a875);
  border-radius: 4px;
  transition: width 0.4s ease;
}
.sat-q .n {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-faint);
  text-align: right;
}
@media (max-width: 600px) {
  .sat-q { grid-template-columns: 1fr 50px; }
  .sat-bar, .sat-q .n { grid-column: 1 / -1; }
}

footer {
  text-align: center;
  margin-top: 40px;
  padding-top: 22px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--ink-faint);
}

<body>
<div class="container">

  <header>
    <div class="brand">
      <div class="eyebrow">Dashboard</div>
      <h1>儀表板</h1>
      <div class="as-of" id="asOf"></div>
    </div>
    <span class="role-tag">管理</span>
  </header>

  <div class="key-bar">
    <label for="doctor_key">通行碼</label>
    <input type="password" id="doctor_key" placeholder="輸入後載入資料" autocomplete="off">
    <button type="button" class="btn-refresh" id="refreshBtn">↻ 重新載入</button>
  </div>

  <div class="alert alert-error" id="errAlert"></div>

  <div id="content">
    <div class="loading-block"><span class="loading"></span> 載入中…</div>
  </div>

  <footer>心臟外科手術病人管理系統 · 儀表板 v1.0</footer>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzr5eDnHyyq2hWZJ1pD4x5z7h8LkabeZMNDcl6o1lWx0e3bE4CLDCkmqYCzPA1qagU2ug/exec';

const $ = (id) => document.getElementById(id);

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[c]);
}

// ===== Key persistence =====
if (window.location.hash.startsWith('#k=')) {
  $('doctor_key').value = decodeURIComponent(window.location.hash.slice(3));
}
$('doctor_key').addEventListener('change', () => {
  const v = $('doctor_key').value;
  if (v) {
    history.replaceState(null, '', '#k=' + encodeURIComponent(v));
    load();
  }
});

// ===== JSONP =====
function jsonp(url, params, timeoutMs = 20000) {
  return new Promise((resolve, reject) => {
    const cb = '_dash_cb_' + Date.now() + '_' + Math.floor(Math.random()*1e6);
    const usp = new URLSearchParams({ ...params, callback: cb });
    const script = document.createElement('script');
    const timer = setTimeout(() => { cleanup(); reject(new Error('查詢逾時')); }, timeoutMs);
    function cleanup() { delete window[cb]; script.remove(); clearTimeout(timer); }
    window[cb] = (data) => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('網路錯誤')); };
    script.src = url + '?' + usp.toString();
    document.body.appendChild(script);
  });
}

// ===== Load =====
async function load() {
  const key = $('doctor_key').value.trim();
  $('errAlert').classList.remove('show');

  if (!key) {
    $('content').innerHTML = '<div class="loading-block">請先輸入通行碼以載入資料</div>';
    return;
  }

  $('content').innerHTML = '<div class="loading-block"><span class="loading"></span> 載入中…</div>';

  try {
    const res = await jsonp(APPS_SCRIPT_URL, { action: 'dashboard', key });
    if (res.error === 'unauthorized') {
      showError('通行碼錯誤');
      $('content').innerHTML = '';
      return;
    }
    if (res.error) {
      showError('載入失敗：' + res.error);
      $('content').innerHTML = '';
      return;
    }
    render(res);

    // 衛教瀏覽量 — 副載入(主 dashboard 載入完成後再請求,不阻塞主視圖)
    loadEduStats(key).catch(err => {
      console.warn('衛教瀏覽量載入失敗:', err);
      // 副載入失敗不顯示錯誤橫幅,只在 console 警告
    });
  } catch (err) {
    showError('載入失敗:' + err.message);
    $('content').innerHTML = '';
  }
}

// ===== 副載入:衛教瀏覽量 =====
async function loadEduStats(key) {
  // 在 content 末尾加上 loading 區塊
  const loadingId = '_edu_loading_' + Date.now();
  $('content').insertAdjacentHTML('beforeend',
    `<div id="${loadingId}" class="loading-block" style="margin-top:20px"><span class="loading"></span> 載入衛教瀏覽量…</div>`
  );

  try {
    const res = await jsonp(APPS_SCRIPT_URL, { action: 'eduStats', key });
    document.getElementById(loadingId)?.remove();

    if (res.error === 'unauthorized') return;
    if (res.error) {
      $('content').insertAdjacentHTML('beforeend',
        `<div class="edu-empty-card"><div class="eec-title">衛教瀏覽量載入失敗</div><div class="eec-desc">${escapeHtml(res.error)}</div></div>`
      );
      return;
    }
    $('content').insertAdjacentHTML('beforeend', renderEduStats(res));
  } catch (err) {
    document.getElementById(loadingId)?.remove();
    console.warn('eduStats 請求失敗:', err);
  }
}

function showError(msg) {
  const el = $('errAlert');
  el.textContent = msg;
  el.classList.add('show');
}

$('refreshBtn').addEventListener('click', load);

// ===== Render =====
function render(d) {
  $('asOf').textContent = d.asOf ? '資料時間：' + d.asOf : '';

  const html = [];
  const h = d.historical || null;
  const ov = d.overview;

  // ===== 01 總覽 =====
  const split = (h && ov.currentSystemVolume != null)
    ? `<div class="ov-split"><span>歷史 ${h.totalPatients}</span><span>本系統 ${ov.currentSystemVolume}</span></div>`
    : '';
  html.push(`
    <h2 class="section-title">
      <span class="num">01</span>
      <span>總覽</span>
    </h2>
    <div class="overview-grid">
      <div class="ov-card" data-accent="teal">
        <div class="ov-label">累積服務量</div>
        <div class="ov-value">${ov.totalServiceVolume}<span class="ov-unit">位</span></div>
        ${split}
      </div>
      ${ovCard('gold', '待開刀', ov.pending, '位')}
      ${ovCard('plum', '進行中', ov.inProgress, '位')}
      ${ovCard('navy', '本月已完成', ov.completedThisMonth, '位')}
    </div>
  `);

  // ===== 02 歷史背景資料 =====
  if (h) html.push(renderHistorical(h));

  // ===== 03 年度趨勢分析 =====
  if (h && h.years && h.years.length >= 2) html.push(renderTrends(h));

  // ===== 04 病人清單 =====
  html.push(`
    <h2 class="section-title">
      <span class="num">04</span>
      <span>病人清單（本系統）</span>
    </h2>
    <div class="tabs" id="tabBar">
      <button type="button" class="tab active" data-tab="pending">待開刀 <span class="count">${d.lists.pending.length}</span></button>
      <button type="button" class="tab" data-tab="inProgress">進行中 <span class="count">${d.lists.inProgress.length}</span></button>
      <button type="button" class="tab" data-tab="closed">已結案 <span class="count">${d.lists.closed.length}</span></button>
    </div>
    <div class="tab-content">
      <div id="tab-pending" class="tab-panel">${renderList(d.lists.pending, 'pending')}</div>
      <div id="tab-inProgress" class="tab-panel" style="display:none">${renderList(d.lists.inProgress, 'inProgress')}</div>
      <div id="tab-closed" class="tab-panel" style="display:none">${renderList(d.lists.closed, 'closed')}</div>
    </div>
  `);

  // ===== 05 ERAS 原始數值 =====
  const rv = d.metrics.rawValues;
  html.push(`
    <h2 class="section-title">
      <span class="num">05</span>
      <span>ERAS 指標 · 原始數值（本系統平均）</span>
      <span class="sub">歷史對照見上方背景區塊</span>
    </h2>
    <div class="metric-grid">
      ${metricCard('術後脫離呼吸器時間', rv.extubation)}
      ${metricCard('術後首次 Try Water 時間', rv.tryWater)}
      ${metricCard('術後首次固體食物進食時間', rv.foodIntake)}
      ${metricCard('術後首次下床走路', rv.ambulation)}
      ${metricCard('術後胸管全拔時間', rv.chestTube)}
      ${metricCard('平均 ICU 滯留時間', rv.icuStay)}
      ${metricCard('平均住院天數', rv.hospitalLOS)}
    </div>
  `);

  // ===== 06 ERAS 指標率 =====
  const rt = d.metrics.rates;
  let histOR = null, histEarly = null;
  if (h && h.overall) {
    const o = h.overall;
    const extKnown = o.extubationTiming.inOR + o.extubationTiming.early + o.extubationTiming.late;
    histOR = { pct: o.rates.orExtubationPct, count: o.extubationTiming.inOR, total: extKnown, label: '歷史 ' + o.totalPatients + ' 例' };
    histEarly = { pct: o.rates.earlyExtubationPct, count: o.extubationTiming.inOR + o.extubationTiming.early, total: extKnown, label: '歷史 ' + o.totalPatients + ' 例' };
  }
  html.push(`
    <h2 class="section-title">
      <span class="num">06</span>
      <span>ERAS 指標 · 指標率</span>
    </h2>
    <div class="rate-grid">
      ${rateCard(
        '手術室中拔管比例',
        '拔管時間 &lt; 轉入加護病房時間',
        rt.extubatedInOR,
        histOR
      )}
      ${rateCard(
        '術後立即拔管比例',
        '術後脫離呼吸器時間 &lt; 6 小時（含手術室中拔管）',
        rt.earlyExtubation,
        histEarly
      )}
    </div>
  `);

  // ===== 06+ 本期重大併發症率（B1，即時從重大異常事件欄）=====
  const comp = d.metrics.complications;
  if (comp && comp.total > 0) {
    const cc = (o) => ({ count: o.count, total: comp.total, pct: o.pct });
    html.push(`
      <h2 class="section-title">
        <span class="num">06+</span>
        <span>本期重大併發症率</span>
        <span class="sub">${comp.total} 例術後紀錄</span>
      </h2>
      <div class="rate-grid">
        ${rateCard('術後急救 (CPR)', '重大異常事件記錄', cc(comp.cpr), null)}
        ${rateCard('重新插管', '重大異常事件記錄', cc(comp.reintubation), null)}
        ${rateCard('再次手術', '重大異常事件記錄', cc(comp.reoperation), null)}
        ${rateCard('中風', '重大異常事件記錄', cc(comp.stroke), null)}
      </div>
    `);
  }

  // ===== 07 病患滿意度 =====
  const sat = d.satisfaction;
  if (sat && sat.totalResponses > 0) {
    html.push(renderSatisfaction(sat));
  } else {
    html.push(`
      <h2 class="section-title">
        <span class="num">07</span>
        <span>病患滿意度</span>
      </h2>
      <div class="placeholder-card">
        <div class="ph-title">${sat ? '尚無問卷回覆' : '敬請期待'}</div>
        <div class="ph-desc">問卷上線後，待病人填寫此區會顯示統計結果。</div>
      </div>
    `);
  }

  $('content').innerHTML = html.join('');

  // Tab binding (patient lists)
  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
      $('tab-' + btn.dataset.tab).style.display = 'block';
    });
  });

  // Year tab binding (historical)
  if (h) bindYearTabs();
}

// ===== Historical section renderer =====
let _currentYear = 'overall';
let _historicalCache = null;

function renderHistorical(h) {
  _historicalCache = h;
  // 預設選「overall」
  return `
    <h2 class="section-title">
      <span class="num">02</span>
      <span>歷史背景資料</span>
      <span class="sub">${escapeHtml(h.dateRange || '')}</span>
    </h2>
    <div class="hist-card">
      <div class="year-tab-bar" id="yearTabBar">
        ${buildYearTabs(h)}
      </div>
      <div id="histContent">${renderHistContent(getYearSummary(h, _currentYear))}</div>
    </div>
  `;
}

function buildYearTabs(h) {
  const allYears = ['overall', ...(h.years || [])];
  return allYears.map(y => {
    const summary = getYearSummary(h, y);
    const label = y === 'overall' ? '全部' : y;
    const count = summary ? summary.totalPatients : 0;
    const active = (y === _currentYear) ? ' active' : '';
    return `<button class="year-tab${active}" data-year="${y}">${label}<span class="yc">${count}</span></button>`;
  }).join('');
}

function getYearSummary(h, year) {
  if (year === 'overall') return h.overall;
  return (h.byYear || {})[year] || null;
}

function bindYearTabs() {
  document.querySelectorAll('#yearTabBar .year-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      _currentYear = btn.dataset.year;
      // 更新 active 樣式
      document.querySelectorAll('#yearTabBar .year-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      // 重新渲染內容
      const summary = getYearSummary(_historicalCache, _currentYear);
      $('histContent').innerHTML = renderHistContent(summary);
    });
  });
}

function renderHistContent(s) {
  if (!s) return '<div class="recent-empty">該年度無資料</div>';

  const pct = (n, total) => total ? (n / total * 100).toFixed(1) : '0.0';
  const erasPct = pct(s.pathway.eras, s.totalPatients);
  const convPct = pct(s.pathway.conventional, s.totalPatients);
  const extKnown = s.extubationTiming.inOR + s.extubationTiming.early + s.extubationTiming.late;
  const orPct = pct(s.extubationTiming.inOR, extKnown);
  const earlyPct = pct(s.extubationTiming.early, extKnown);
  const latePct = pct(s.extubationTiming.late, extKnown);

  const m = s.metrics;
  const co = s.comorbidities;
  const out = s.outcomes;

  const fmtVal = (v) => (v == null || isNaN(v)) ? '—' : v;

  return `
    <div class="hist-band">
      <div class="total-num">${s.totalPatients}</div>
      <div class="total-label"><strong>例</strong> 病人</div>
    </div>

    <div class="hist-sub">治療流程</div>
    <div class="hist-row">
      <div class="hist-stat">
        <div class="lbl">ERAS 流程</div>
        <div class="val">${s.pathway.eras} <span class="small">/ ${s.totalPatients} · ${erasPct}%</span></div>
        <div class="pct-bar"><div class="fill" style="width:${erasPct}%"></div></div>
      </div>
      <div class="hist-stat">
        <div class="lbl">傳統流程</div>
        <div class="val">${s.pathway.conventional} <span class="small">/ ${s.totalPatients} · ${convPct}%</span></div>
        <div class="pct-bar"><div class="fill" style="width:${convPct}%"></div></div>
      </div>
    </div>

    <div class="hist-sub">拔管時機分布</div>
    <div class="hist-row">
      <div class="hist-stat">
        <div class="lbl">手術室中拔管</div>
        <div class="val">${s.extubationTiming.inOR} <span class="small">· ${orPct}%</span></div>
        <div class="pct-bar"><div class="fill" style="width:${orPct}%"></div></div>
      </div>
      <div class="hist-stat">
        <div class="lbl">&lt; 6 小時拔管</div>
        <div class="val">${s.extubationTiming.early} <span class="small">· ${earlyPct}%</span></div>
        <div class="pct-bar"><div class="fill" style="width:${earlyPct}%"></div></div>
      </div>
      <div class="hist-stat">
        <div class="lbl">&gt; 6 小時拔管</div>
        <div class="val">${s.extubationTiming.late} <span class="small">· ${latePct}%</span></div>
        <div class="pct-bar"><div class="fill" style="width:${latePct}%"></div></div>
      </div>
    </div>

    <div class="hist-sub">平均指標</div>
    <div class="hist-row">
      <div class="hist-stat">
        <div class="lbl">平均住院天數</div>
        <div class="val">${fmtVal(m.hospitalLOSDays.avg)} <span class="small">天 · 中位 ${fmtVal(m.hospitalLOSDays.median)}</span></div>
      </div>
      <div class="hist-stat">
        <div class="lbl">平均 ICU 天數</div>
        <div class="val">${fmtVal(m.icuStayDays.avg)} <span class="small">天 · 中位 ${fmtVal(m.icuStayDays.median)}</span></div>
      </div>
      <div class="hist-stat">
        <div class="lbl">平均術後插管天數</div>
        <div class="val">${fmtVal(m.intubationDays.avg)} <span class="small">天 · 中位 ${fmtVal(m.intubationDays.median)}</span></div>
      </div>
      <div class="hist-stat">
        <div class="lbl">平均術前 LVEF</div>
        <div class="val">${fmtVal(m.preopLVEF.avg)}<span class="small">%</span></div>
      </div>
    </div>

    <div class="hist-sub">共病比例</div>
    <div class="hist-row">
      ${comoCard('糖尿病', co.DM)}
      ${comoCard('高血壓', co.HTN)}
      ${comoCard('慢性腎病', co.CKD)}
      ${comoCard('腎病末期', co.ESRD)}
      ${comoCard('腦血管病史', co.CVA)}

      <div class="chart-card">
        <div class="chart-title">ERAS 採用率</div>

          yUnit: '%', yMin: 0, yMax: 100

      </div>
    </div>

    <div class="trend-grid full">
      <div class="chart-card">
        <div class="chart-title">
          <span>平均恢復指標</span>
          ${legend([
            { name: '住院天數', color: CHART_COLORS.teal },
            { name: 'ICU 天數', color: CHART_COLORS.plum },
            { name: '術後插管天數', color: CHART_COLORS.gold },
          ])}
        </div>
        ${renderLineChart({
          xLabels,
          series: [
            { name: '住院天數', color: CHART_COLORS.teal, values: seriesData.losAvg },
            { name: 'ICU 天數', color: CHART_COLORS.plum, values: seriesData.icuAvg },
            { name: '術後插管天數', color: CHART_COLORS.gold, values: seriesData.intubAvg },

          yUnit: ' 天', yMin: 0

      </div>
    </div>

    <div class="trend-grid full">
      <div class="chart-card">
        <div class="chart-title">
          <span>拔管時機比例</span>

            { name: '立即拔管 (<6hr)', color: CHART_COLORS.navy },

// ===== SVG chart helpers =====
function renderLineChart(opts) {
  const W = 480, H = 200;
  const pad = { top: 14, right: 14, bottom: 28, left: 36 };
  const chartW = W - pad.left - pad.right;
  const chartH = H - pad.top - pad.bottom;

  let allY = [];
  opts.series.forEach(s => s.values.forEach(v => {
    if (v != null && !isNaN(v)) allY.push(v);
  }));

  let yMin = opts.yMin != null ? opts.yMin : (allY.length ? Math.min(...allY) : 0);
  let yMax = opts.yMax != null ? opts.yMax : (allY.length ? Math.max(...allY) * 1.15 : 10);
  if (yMax === yMin) yMax = yMin + 1;

  const n = opts.xLabels.length;
  const xPos = (i) => pad.left + (n === 1 ? chartW / 2 : (i / (n - 1)) * chartW);
  const yPos = (v) => pad.top + chartH - ((v - yMin) / (yMax - yMin)) * chartH;

  const fmtVal = (v) => v >= 10 ? Math.round(v) : (Math.round(v * 10) / 10);

  let svg = `<svg viewBox="0 0 ${W} ${H}" class="trend-chart" preserveAspectRatio="xMidYMid meet">`;

  // Grid lines + Y labels (5 horizontal grid lines)
  for (let i = 0; i <= 4; i++) {
    const yc = pad.top + (i / 4) * chartH;
    const v = yMax - (i / 4) * (yMax - yMin);
    svg += `<line x1="${pad.left}" y1="${yc}" x2="${W - pad.right}" y2="${yc}" class="grid"/>`;
    svg += `<text x="${pad.left - 5}" y="${yc + 3}" class="y-label">${fmtVal(v)}</text>`;
  }

  // X axis labels
  opts.xLabels.forEach((label, i) => {
    svg += `<text x="${xPos(i)}" y="${H - pad.bottom + 16}" class="x-label">${label}</text>`;
  });

  // Series
  opts.series.forEach((s) => {
    const pts = s.values.map((v, i) => (v != null && !isNaN(v)) ? { x: xPos(i), y: yPos(v), val: v, label: opts.xLabels[i] } : null);

    // Connected line through non-null points
    const validPts = pts.filter(p => p);
    if (validPts.length >= 2) {
      const poly = validPts.map(p => `${p.x},${p.y}`).join(' ');
      svg += `<polyline points="${poly}" fill="none" stroke="${s.color}" stroke-width="2" class="line"/>`;
    }

    // Dots
    pts.forEach(p => {
      if (!p) return;
      svg += `<circle cx="${p.x}" cy="${p.y}" r="3.5" fill="${s.color}" class="dot"><title>${p.label}: ${fmtVal(p.val)}${opts.yUnit || ''}</title></circle>`;
    });
  });

  svg += `</svg>`;
  return svg;
}

function renderBarChart(opts) {
  const W = 480, H = 200;
  const pad = { top: 18, right: 14, bottom: 28, left: 36 };
  const chartW = W - pad.left - pad.right;
  const chartH = H - pad.top - pad.bottom;

  const values = opts.values || [];
  const n = values.length;
  if (!n) return '<svg></svg>';

  const yMax = Math.max(...values, 1) * 1.15;
  const slot = chartW / n;
  const barW = slot * 0.65;
  const fmtVal = (v) => v >= 10 ? Math.round(v) : (Math.round(v * 10) / 10);

  let svg = `<svg viewBox="0 0 ${W} ${H}" class="trend-chart" preserveAspectRatio="xMidYMid meet">`;

  // Grid + Y labels
  for (let i = 0; i <= 4; i++) {
    const yc = pad.top + (i / 4) * chartH;
    const v = yMax - (i / 4) * yMax;
    svg += `<line x1="${pad.left}" y1="${yc}" x2="${W - pad.right}" y2="${yc}" class="grid"/>`;
    svg += `<text x="${pad.left - 5}" y="${yc + 3}" class="y-label">${fmtVal(v)}</text>`;
  }

  // Bars
  values.forEach((v, i) => {
    const cx = pad.left + slot * i + slot / 2;
    const x = cx - barW / 2;
    const barH = (v / yMax) * chartH;
    const y = pad.top + chartH - barH;
    svg += `<rect x="${x}" y="${y}" width="${barW}" height="${barH}" fill="${opts.color || '#1F5A5A'}" class="bar"><title>${opts.xLabels[i]}: ${v}${opts.yUnit || ''}</title></rect>`;
    svg += `<text x="${cx}" y="${y - 4}" class="bar-label">${v}</text>`;
    svg += `<text x="${cx}" y="${H - pad.bottom + 16}" class="x-label">${opts.xLabels[i]}</text>`;
  });

  svg += `</svg>`;
  return svg;
}

// ===== Satisfaction renderer =====
function renderSatisfaction(sat) {
  const renderBig = (label, m) => {
    if (!m) {
      return `
        <div class="sat-big-card">
          <div class="lbl">${label}</div>
          <div class="big muted">—</div>
          <div class="meta">尚無有效回覆</div>
        </div>
      `;
    }
    const scale = m.scale || 5;
    // 推薦意願如果有 recommendPct（推薦率），加一行顯示
    const extra = (m.recommendPct != null)
      ? `<div class="meta" style="margin-top:4px;color:var(--gold);font-weight:500">推薦率（top-2 box）: ${m.recommendPct}%</div>`
      : '';
    return `
      <div class="sat-big-card">
        <div class="lbl">${label}</div>
        <div class="big">${m.avg}<span class="big-unit">/ ${scale}</span></div>
        <div class="meta">${m.n} 份有效回覆</div>
        ${extra}
      </div>
    `;
  };

  const renderQ = (q) => {
    if (q.avg == null) {
      return `<div class="sat-q"><span class="lbl">${escapeHtml(q.label)}</span><span class="val muted">—</span><span></span><span class="n">n=0</span></div>`;
    }
    const fillPct = (q.avg / 5 * 100).toFixed(0);
    return `
      <div class="sat-q">
        <span class="lbl">${escapeHtml(q.label)}</span>
        <span class="val">${q.avg}</span>
        <div class="sat-bar"><div class="fill" style="width:${fillPct}%"></div></div>
        <span class="n">n=${q.n}</span>
      </div>
    `;
  };

  return `
    <h2 class="section-title">
      <span class="num">07</span>
      <span>病患滿意度</span>
      <span class="sub">${sat.totalResponses} 份回覆</span>
    </h2>

    <div class="sat-grid">
      ${renderBig('整體滿意度', sat.overall)}
      ${renderBig('推薦意願', sat.recommend)}
    </div>

    <div class="sat-q-card">
      <div class="sat-q-title">CARE 指標（Q1–Q10）</div>
      <div class="sat-q-list">
        ${sat.careAvgs.map(renderQ).join('')}
      </div>
    </div>

    <div class="sat-q-card">
      <div class="sat-q-title">心臟手術專項（Q11–Q16）</div>
      <div class="sat-q-list">
        ${sat.cardiacAvgs.map(renderQ).join('')}
      </div>
    </div>
  `;
}

function ovCard(accent, label, value, unit) {
  return `
    <div class="ov-card" data-accent="${accent}">
      <div class="ov-label">${label}</div>
      <div class="ov-value">${value}<span class="ov-unit">${unit}</span></div>
    </div>
  `;
}

function metricCard(label, m) {
  if (!m || m.pending) {
    return `
      <div class="mc pending">
        <div class="mc-label">${label}</div>
        <div class="mc-value muted">—</div>
        <div class="mc-meta">${m && m.note ? escapeHtml(m.note) : '尚未啟用'}</div>
      </div>
    `;
  }
  if (m.avg == null) {
    return `
      <div class="mc">
        <div class="mc-label">${label}</div>
        <div class="mc-value muted">—</div>
        <div class="mc-meta">尚無資料</div>
      </div>
    `;
  }
  return `
    <div class="mc">
      <div class="mc-label">${label}</div>
      <div class="mc-value">${m.avg}<span class="unit">${escapeHtml(m.unit || '')}</span></div>
      <div class="mc-meta">基於 ${m.count} 筆紀錄</div>
    </div>
  `;
}

function rateCard(label, defText, r, histRef) {
  const histLine = histRef
    ? `<div class="historical-ref">${escapeHtml(histRef.label || '歷史')}：<span class="hist-val">${histRef.pct}%</span>（${histRef.count} / ${histRef.total}）</div>`
    : '';
  if (!r || r.pct == null) {
    return `
      <div class="rate-card">
        <div class="rate-label">${label}</div>
        <div class="rate-def">${defText}</div>
        <div class="rate-value muted">本系統：尚無資料</div>
        ${histLine}
      </div>
    `;
  }
  return `
    <div class="rate-card">
      <div class="rate-label">${label}</div>
      <div class="rate-def">${defText}</div>
      <div class="rate-value">${r.pct}<span class="unit">%</span></div>
      <div class="rate-frac">本系統 ${r.count} / ${r.total} 位</div>
      ${histLine}
    </div>
  `;
}

function renderList(items, kind) {
  if (!items || items.length === 0) {
    let msg = '目前無資料';
    if (kind === 'pending') msg = '目前沒有待開刀的病人';
    else if (kind === 'inProgress') msg = '目前沒有進行中的病人';
    else if (kind === 'closed') msg = '目前沒有已結案的病人';
    return `<div class="plist-empty">${msg}</div>`;
  }

  const rows = [];
  rows.push(`
    <div class="plist-row header">
      <div>姓名 / 性別年齡</div>
      <div>${kind === 'pending' ? '預定手術日' : '實際手術日'}</div>
      <div>術式</div>
      <div>狀態</div>
    </div>
  `);
  items.forEach(p => {
    const dateShown = kind === 'pending' ? (p.scheduledDate || '—') : (p.actualDate || p.scheduledDate || '—');
    rows.push(`
      <div class="plist-row">
        <div>
          <span class="name">${escapeHtml(p.name)}</span>
          <span class="meta"> · ${escapeHtml(p.gender || '')} ${p.age != null ? p.age + ' 歲' : ''}</span>
        </div>
        <div class="date">${dateShown}</div>
        <div class="surgery">${escapeHtml(p.surgery || '—')}</div>
        <div>${statusPill(p)}</div>
      </div>
    `);
  });
  return rows.join('');
}

function statusPill(p) {
  if (p.status === '取消') return '<span class="status-pill cancelled">取消</span>';
  if (p.status === '改期') return '<span class="status-pill reschedule">改期</span>';
  if (p.status === '已完成') {
    return p.closed
      ? '<span class="status-pill cancelled">已結案</span>'
      : '<span class="status-pill completed">已完成</span>';
  }
  if (p.status === '排定中') return '<span class="status-pill scheduled">排定中</span>';
  return '<span class="status-pill cancelled">—</span>';
}

// ===== Edu pageview stats renderer =====
function renderEduStats(res) {
  // Empty 狀態
  if (res.empty) {
    return `
      <h2 class="section-title">
        <span class="num">08</span>
        <span>衛教瀏覽量統計</span>
      </h2>
      <div class="edu-empty-card">
        <div class="eec-title">尚無瀏覽紀錄</div>
        <div class="eec-desc">當病人或家屬首次點開衛教單張後,此區會顯示累計統計。<br>(系統會自動建立「瀏覽紀錄」工作表記錄每一筆瀏覽)</div>
      </div>
    `;
  }

  const t = res.totals;

  // 統計卡片
  const statCards = `
    <div class="edu-stats-grid">
      <div class="edu-stat-card" data-accent="teal">
        <div class="es-label">總瀏覽量</div>
        <div class="es-value">${t.totalViews}<span class="es-unit">次</span></div>
      </div>
      <div class="edu-stat-card" data-accent="gold">
        <div class="es-label">不重複病人</div>
        <div class="es-value">${t.uniquePatients}<span class="es-unit">位</span></div>
      </div>
      <div class="edu-stat-card" data-accent="plum">
        <div class="es-label">訪客瀏覽量</div>
        <div class="es-value">${t.guestViews}<span class="es-unit">次</span></div>
      </div>
      <div class="edu-stat-card" data-accent="navy">
        <div class="es-label">已有瀏覽的單張</div>
        <div class="es-value">${t.totalArticles}<span class="es-unit">份</span></div>
      </div>
    </div>
  `;

  // 排行(全部 byArticle,依瀏覽量排序)
  const rankRows = res.byArticle.map((a, i) => {
    const rank = i + 1;
    const rankClass = rank <= 3 ? 'top' : '';
    const durStr = a.avgDuration != null ? `${a.avgDuration} 秒` : '—';
    return `
      <div class="edu-rank-row">
        <span class="er-rank ${rankClass}">${rank}</span>
        <span class="er-code">${escapeHtml(a.code)}</span>
        <span class="er-name">${escapeHtml(a.name)}</span>
        <span class="er-views">${a.views}</span>
        <span class="er-unique">${a.uniquePatients} 位</span>
        <span class="er-dur">${durStr}</span>
      </div>
    `;
  }).join('');

  const rankCard = `
    <div class="edu-rank-card">
      <div class="erc-title">各單張瀏覽量排行</div>
      <div class="erc-sub">依累計瀏覽量排序 · 共 ${res.byArticle.length} 份單張被瀏覽過</div>
      <div class="edu-rank-row" style="border-bottom:1px solid var(--border);padding-bottom:6px;font-size:11px;color:var(--ink-faint);font-weight:600;">
        <span class="er-rank">#</span>
        <span class="er-code">代號</span>
        <span class="er-name">單張名稱</span>
        <span class="er-views">瀏覽</span>
        <span class="er-unique">不重複</span>
        <span class="er-dur">平均停留</span>
      </div>
      ${rankRows}
    </div>
  `;

  // 最近 7 日趨勢(bar chart)
  const maxDayViews = Math.max(...res.recent7Days.map(d => d.views), 1);
  const trendBars = res.recent7Days.map(d => {
    const pct = (d.views / maxDayViews) * 100;
    const zeroAttr = d.views === 0 ? 'data-zero="1"' : '';
    return `<div class="edu-trend-bar" ${zeroAttr} style="height:${pct}%">${d.views > 0 ? `<span class="etb-label">${d.views}</span>` : ''}</div>`;
  }).join('');

  const trendDates = res.recent7Days.map(d => {
    // 只顯示 MM/DD
    const md = d.date.slice(5).replace('-', '/');
    return `<span>${md}</span>`;
  }).join('');

  const trendCard = `
    <div class="edu-trend-card">
      <div class="etc-title">最近 7 日瀏覽趨勢</div>
      <div class="edu-trend-bars">${trendBars}</div>
      <div class="edu-trend-dates">${trendDates}</div>
    </div>
  `;

  return `
    <h2 class="section-title">
      <span class="num">08</span>
      <span>衛教瀏覽量統計</span>
      <span class="sub">${t.totalViews} 次累計瀏覽 · ${t.uniquePatients} 位病人</span>
    </h2>
    ${statCards}
    ${trendCard}
    ${rankCard}
  `;
}
